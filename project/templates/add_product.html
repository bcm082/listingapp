{% extends "base.html" %}

{% block content %}
<h1>Add New Product</h1>
<form method="POST">
    <!-- Add form elements for all the product fields here. For example: -->
    <div class="mb-3">
        <label class="form-label">SKU</label>
        <input type="text" class="form-control" name="sku" required>
    </div>
    <div class="mb-3">
        <label class="form-label">ASIN</label>
        <input type="text" class="form-control" name="asin">
    </div>
    <div class="mb-3">
        <label class="form-label">UPC</label>
        <input type="text" class="form-control" name="upc">
    </div>
    <div class="mb-3">
        <label class="form-label">Parent SKU</label>
        <input type="text" class="form-control" name="parent_sku">
    </div>
    <div class="mb-3">
        <label class="form-label">Brand Name</label>
        <input type="text" class="form-control" name="brand_name">
    </div>
    <div class="mb-3">
        <label class="form-label">Product Name</label>
        <input type="text" class="form-control" name="product_name" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Product Description</label>
        <input type="text" class="form-control" name="product_description">
    </div>
    <div class="mb-3">
        <label class="form-label">Quantity</label>
        <input type="text" class="form-control" name="quantity">
    </div>
    <div class="mb-3">
        <label class="form-label">Price</label>
        <input type="text" class="form-control" name="price">
    </div>
    <br>
    <hr>
    <h3>Bullet Points</h3>
    <div class="mb-3">
        <label class="form-label">Bullet Point 1</label>
        <input type="text" class="form-control" name="bullet_point_1">
    </div>
    <div class="mb-3">
        <label class="form-label">Bullet Point 2</label>
        <input type="text" class="form-control" name="bullet_point_2">
    </div>
    <div class="mb-3">
        <label class="form-label">Bullet Point 3</label>
        <input type="text" class="form-control" name="bullet_point_3">
    </div>
    <div class="mb-3">
        <label class="form-label">Bullet Point 4</label>
        <input type="text" class="form-control" name="bullet_point_4">
    </div>
    <div class="mb-3">
        <label class="form-label">Bullet Point 5</label>
        <input type="text" class="form-control" name="bullet_point_5">
    </div>
    <br>
    <hr>
    <h3>Images Link</h3>
    <div class="mb-3">
        <label class="form-label">Image 1</label>
        <input type="text" class="form-control" name="image_1">
    </div>
    <div class="mb-3">
        <label class="form-label">Image 2</label>
        <input type="text" class="form-control" name="image_2">
    </div>
    <div class="mb-3">
        <label class="form-label">Image 3</label>
        <input type="text" class="form-control" name="image_3">
    </div>
    <div class="mb-3">
        <label class="form-label">Image 4</label>
        <input type="text" class="form-control" name="image_4">
    </div>
    <div class="mb-3">
        <label class="form-label">Image 5</label>
        <input type="text" class="form-control" name="image_5">
    </div>
    <div class="mb-3">
        <label class="form-label">Image 6</label>
        <input type="text" class="form-control" name="image_6">
    </div>
    <div class="mb-3">
        <label class="form-label">Image 7</label>
        <input type="text" class="form-control" name="image_7">
    </div>
    <br>
    <hr>
    <h3>Video Link</h3>
    <div class="mb-3">
        <label class="form-label">Video</label>
        <input type="text" class="form-control" name="video">
    </div>
    <br>
    <hr>
    <h3>A+ Content Modules</h3>
    <div class="mb-3">
        <label class="form-label">Module 1</label>
        <input type="text" class="form-control" name="aplus_1">
    </div>
    <div class="mb-3">
        <label class="form-label">Module 2</label>
        <input type="text" class="form-control" name="aplus_2">
    </div>
    <div class="mb-3">
        <label class="form-label">Module 3</label>
        <input type="text" class="form-control" name="aplus_3">
    </div>
    <div class="mb-3">
        <label class="form-label">Module 4</label>
        <input type="text" class="form-control" name="aplus_4">
    </div>
    <div class="mb-3">
        <label class="form-label">Module 5</label>
        <input type="text" class="form-control" name="aplus_5">
    </div>
    <div class="mb-3">
        <label class="form-label">Module 6</label>
        <input type="text" class="form-control" name="aplus_6">
    </div>
    <div class="mb-3">
        <label class="form-label">Module 7</label>
        <input type="text" class="form-control" name="aplus_7">
    </div>

    <!-- Repeat above block for all other fields -->
    <br>
    <hr>
    <button type="submit" class="btn btn-primary">Add Product</button>
    <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary">Cancel</a>
</form>
<br>
<br>
{% endblock %}
